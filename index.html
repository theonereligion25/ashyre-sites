<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Neon Green Snake Game</title>
<style>
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: 'Courier New', Courier, monospace;
    color: #39ff14;
    user-select: none;
  }
  canvas {
    background: #111;
    border: 3px solid #39ff14;
    border-radius: 12px;
    box-shadow: 0 0 15px #39ff14;
  }
  #score {
    position: absolute;
    top: 20px;
    font-size: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    text-shadow: 0 0 8px #39ff14;
  }
</style>
</head>
<body>
  <div id="score">Score: 0</div>
  <canvas id="game" width="400" height="400"></canvas>

<script>
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const gridSize = 20;
  const tileCount = canvas.width / gridSize;

  let snake = [{x: 10, y: 10}];
  let velocity = {x: 0, y: 0};
  let food = {x: 15, y: 15};
  let score = 0;
  let gameOver = false;

  function draw() {
    if (gameOver) return;

    // move snake
    const head = {...snake[0]};
    head.x += velocity.x;
    head.y += velocity.y;

    // wrap around edges
    head.x = (head.x + tileCount) % tileCount;
    head.y = (head.y + tileCount) % tileCount;

    // check collisions with self
    if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
      gameOver = true;
      alert(`Game Over! Your final score: ${score}. Refresh to play again.`);
      return;
    }

    snake.unshift(head);

    // eat food
    if (head.x === food.x && head.y === food.y) {
      score++;
      document.getElementById('score').textContent = `Score: ${score}`;
      placeFood();
    } else {
      snake.pop();
    }

    // background
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // draw food
    ctx.fillStyle = '#39ff14';
    ctx.beginPath();
    ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
    ctx.fill();

    // draw snake
    ctx.fillStyle = '#39ff14';
    snake.forEach((segment, index) => {
      ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize, gridSize);
      if (index === 0) {
        // eye on the head for fun
        ctx.fillStyle = '#000';
        const eyeSize = gridSize / 5;
        ctx.fillRect(segment.x * gridSize + eyeSize, segment.y * gridSize + eyeSize, eyeSize, eyeSize);
        ctx.fillRect(segment.x * gridSize + gridSize - eyeSize * 2, segment.y * gridSize + eyeSize, eyeSize, eyeSize);
        ctx.fillStyle = '#39ff14';
      }
    });
  }

  function placeFood() {
    let newFood;
    do {
      newFood = {
        x: Math.floor(Math.random() * tileCount),
        y: Math.floor(Math.random() * tileCount)
      };
    } while (snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));
    food = newFood;
  }

  function gameLoop() {
    draw();
    if (!gameOver) setTimeout(gameLoop, 100);
  }

  window.addEventListener('keydown', e => {
    switch(e.key) {
      case 'ArrowUp':
        if (velocity.y === 1) break;
        velocity = {x: 0, y: -1};
        break;
      case 'ArrowDown':
        if (velocity.y === -1) break;
        velocity = {x: 0, y: 1};
        break;
      case 'ArrowLeft':
        if (velocity.x === 1) break;
        velocity = {x: -1, y: 0};
        break;
      case 'ArrowRight':
        if (velocity.x === -1) break;
        velocity = {x: 1, y: 0};
        break;
    }
  });

  // start moving right by default
  velocity = {x: 1, y: 0};
  gameLoop();
</script>
</body>
</html>
