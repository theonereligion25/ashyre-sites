<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Decentralized Identity Sample</title>
<style>
  body {
    background: #121212;
    color: #39ff14;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
  }
  button {
    background: #39ff14;
    border: none;
    border-radius: 8px;
    color: #121212;
    padding: 1em 2em;
    font-weight: bold;
    cursor: pointer;
    margin-top: 1rem;
    box-shadow: 0 0 10px #39ff14;
  }
  pre {
    background: #222;
    border-radius: 8px;
    padding: 1em;
    max-width: 90vw;
    overflow-x: auto;
  }
  #status {
    margin-top: 1rem;
    font-size: 1.2rem;
    text-align: center;
  }
</style>
</head>
<body>
  <h1>Decentralized Identity Demo</h1>
  <p>Generate your cryptographic identity keypair and prove ownership with a signature challenge—no biometrics needed.</p>
  <button id="generateKey">Generate Identity Keypair</button>
  <button id="signChallenge" disabled>Sign Login Challenge</button>
  <pre id="output"></pre>
  <div id="status"></div>

<script>
  let keyPair = null;
  const output = document.getElementById('output');
  const status = document.getElementById('status');
  const generateBtn = document.getElementById('generateKey');
  const signBtn = document.getElementById('signChallenge');

  async function generateKeyPair() {
    status.textContent = 'Generating keypair...';
    keyPair = await window.crypto.subtle.generateKey(
      {
        name: "ECDSA",
        namedCurve: "P-256",
      },
      true,
      ["sign", "verify"]
    );
    status.textContent = 'Keypair generated. Public key exported.';
    const publicKey = await window.crypto.subtle.exportKey('spki', keyPair.publicKey);
    const pubKeyBase64 = btoa(String.fromCharCode(...new Uint8Array(publicKey)));
    output.textContent = `Public Key (Base64):\n${pubKeyBase64}`;
    signBtn.disabled = false;
  }

  async function signChallenge() {
    if (!keyPair) return;
    const challenge = new TextEncoder().encode("LoginChallenge:" + new Date().toISOString());
    const signature = await window.crypto.subtle.sign(
      {
        name: "ECDSA",
        hash: { name: "SHA-256" }
      },
      keyPair.privateKey,
      challenge
    );
    const sigBase64 = btoa(String.fromCharCode(...new Uint8Array(signature)));
    output.textContent += `\n\nSigned Challenge:\n${sigBase64}`;
    status.textContent = 'Challenge signed! Identity verified without biometrics.';
  }

  generateBtn.addEventListener('click', generateKeyPair);
  signBtn.addEventListener('click', signChallenge);
</script>
</body>
</html>
