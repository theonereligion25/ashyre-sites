<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Donkey Kong Fun Zone</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  body {
    margin: 0;
    background: linear-gradient(180deg, #4c2c00 0%, #2e1a00 100%);
    font-family: 'Press Start 2P', cursive;
    color: #ffd600;
    overflow-x: hidden;
    user-select: none;
  }

  header {
    text-align: center;
    padding: 2rem 1rem;
    color: #ffcc00;
    text-shadow: 2px 2px #662e00;
  }

  header h1 {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
  }

  header p {
    font-size: 1rem;
    color: #ffeb3b;
  }

  .arena {
    position: relative;
    width: 90vw;
    max-width: 800px;
    height: 400px;
    margin: 2rem auto;
    background:
      linear-gradient(to top, #2e1a00 10%, transparent 10%),
      repeating-linear-gradient(45deg, #6b4a00 0, #6b4a00 5px, #4b3200 5px, #4b3200 10px);
    border: 5px solid #ffcc00;
    border-radius: 12px;
    box-shadow: 0 0 20px #ffcc00 inset;
    overflow: visible;
  }

  /* Pixel style barrel */
  .barrel {
    position: absolute;
    bottom: 60px;
    width: 50px;
    height: 50px;
    background: #6b4a00;
    border: 4px solid #4b3200;
    border-radius: 12px;
    box-shadow:
      inset 8px 8px 0 #9a6f00,
      inset -8px -8px 0 #3b2200;
    animation: roll 5s linear infinite;
  }

  .barrel:nth-child(1) {
    left: -60px;
    animation-delay: 0s;
  }

  .barrel:nth-child(2) {
    left: -120px;
    bottom: 120px;
    animation-delay: 2.5s;
  }

  /* Barrel rolling across screen */
  @keyframes roll {
    0% {
      transform: translateX(0) rotate(0deg);
    }
    100% {
      transform: translateX(110vw) rotate(360deg);
    }
  }

  /* Donkey Kong pixel art style */
  .donkey {
    position: absolute;
    bottom: 110px;
    left: 40px;
    width: 120px;
    height: 160px;
    background:
      linear-gradient(90deg, #4b2e00 25%, #6b4a00 25%);
    border-radius: 30px 30px 20px 20px;
    box-shadow:
      10px 20px 0 #3b2200,
      inset 30px 40px 0 #d2691e;
  }

  /* Banana pixel */
  .banana {
    position: absolute;
    top: 60px;
    right: 60px;
    width: 60px;
    height: 30px;
    background: linear-gradient(135deg, #ffe135, #fcd440);
    border-radius: 50% / 100%;
    box-shadow: inset -5px 0 #d4af37;
    transform: rotate(15deg);
    animation: bounce 3s ease-in-out infinite;
  }

  @keyframes bounce {
    0%, 100% {
      transform: translateY(0) rotate(15deg);
    }
    50% {
      transform: translateY(-20px) rotate(15deg);
    }
  }

  /* Jumping hero */
  .hero {
    position: absolute;
    bottom: 70px;
    left: 200px;
    width: 60px;
    height: 100px;
    background: #d2691e;
    border-radius: 15px 15px 10px 10px;
    box-shadow:
      inset 10px 10px 0 #a0522d,
      inset -10px -10px 0 #8b4513;
    animation: jump 4s ease-in-out infinite;
  }

  @keyframes jump {
    0%, 100% { bottom: 70px; }
    50% { bottom: 150px; }
  }

  footer {
    text-align: center;
    color: #ffcc00;
    font-size: 0.8rem;
    margin-top: 3rem;
    text-shadow: 1px 1px #662e00;
  }
</style>
</head>
<body>
  <header>
    <h1>Donkey Kong Fun Zone</h1>
    <p>Barrels roll, bananas fly, and the hero jumps for glory!</p>
  </header>

  <div class="arena" aria-label="Donkey Kong game scene">
    <div class="donkey" aria-label="Donkey Kong"></div>
    <div class="barrel" aria-label="Rolling barrel"></div>
    <div class="barrel" aria-label="Rolling barrel"></div>
    <div class="banana" aria-label="Banana"></div>
    <div class="hero" aria-label="Jumping hero"></div>
  </div>

  <footer>
    © 1981 Nintendo - Just for fun by Paul & Ashyre
  </footer>
</body>
</html>
